name: Update Leaderboard

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch competitor list
        run: |
          curl -s "https://sports.core.api.espn.com/v2/sports/golf/leagues/pga/events/401811951/competitions/401811951/competitors" \
          > competitors.json

      - name: Build leaderboard
        run: |
          echo '{ "status": "ok", "players": [' > Leaderboard.json

          # Loop through each competitor reference
          for url in $(jq -r '.items[].$ref' competitors.json); do
            data=$(curl -s "$url")

            name=$(echo "$data" | jq -r '.athlete.displayName')
            position=$(echo "$data" | jq -r '.status.position.displayName')
            score=$(echo "$data" | jq -r '.score.value')
            thru=$(echo "$data" | jq -r '.status.period')

            echo "{ \"name\": \"$name\", \"position\": \"$position\", \"score\": $score, \"thru\": $thru }," >> Leaderboard.json
          done

          # Close JSON array
          echo '] }' >> Leaderboard.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Leaderboard.json
          git commit -m "Auto-update leaderboard" || echo "No changes"
          git push
