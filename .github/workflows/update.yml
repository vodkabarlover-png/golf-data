name: Update Leaderboard

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch leaderboard safely (no jq)
        run: |
          # Fetch raw data through AllOrigins
          curl -s "https://api.allorigins.win/raw?url=https://api.thescore.com/golf/pga/events" > events_raw.txt

          # Always write a valid JSON file, even if API fails
          echo '{ "status": "ok", "players": [] }' > Leaderboard.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Leaderboard.json
          git commit -m "Auto-update leaderboard" || echo "No changes"
          git push
