name: Update Leaderboard

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug curl output
        run: |
          echo "=== CURL OUTPUT START ==="
          curl -v https://api.thescore.com/golf/pga/events || true
          echo "=== CURL OUTPUT END ==="
