name: Update Leaderboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch live leaderboard
        run: |
          curl -s "https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard" \
          | jq '{
              status: "ok",
              players: (
                .events[0].competitions[0].competitors // [] 
                | map({
                    name: (.athlete.displayName // "Unknown"),
                    position: (.status.position.displayName // "-"),
                    score: (.score.value // 0),
                    thru: (.status.period // 0)
                  })
              )
            }' > Leaderboard.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Leaderboard.json
          git commit -m "Auto-update leaderboard" || echo "No changes"
          git push
