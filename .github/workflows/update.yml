name: Update Leaderboard

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch PGA leaderboard from TheScore
        run: |
          curl -s "https://api.thescore.com/golf/pga/events" > events.json

          event_id=$(jq -r '[.[] | select(.is_live == true)][0].id' events.json)

          curl -s "https://api.thescore.com/golf/pga/events/$event_id" > event.json

          jq '{
            status: "ok",
            players: (
              .players | map({
                name: .full_name,
                position: .current_position,
                score: .score,
                thru: .thru
              })
            )
          }' event.json > Leaderboard.json

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add Leaderboard.json
          git commit -m "Auto-update leaderboard" || echo "No changes"
          git push
